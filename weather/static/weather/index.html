<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
        <link rel="stylesheet" href="styles/styles.css">
        <title>Weather App</title>
    </head>
    <body>
        <div class="weather-grid">
            <div>
                <canvas id="Temperature Chart"></canvas>
            </div>
            <div>
                <canvas id="Perceived Temperature Chart"></canvas>
            </div>
            <div>
                <canvas id="Rain Chart"></canvas>
            </div>
            <div>
                <canvas id="Humidity Chart"></canvas>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <select id="citySelect">
            <option value="">Pick City</option>
        </select>

        <script>
            async function fetchCities() {
                const url = `/api/cities/`;

                try {
                    const response = await fetch(url)
                    if (!response.ok) {
                        throw new Error(`Response status: ${response.status}`)
                    }

                    const cities = await response.json();

                    const city_list = document.getElementById('citySelect');

                    cities.forEach(city => {
                        const option = document.createElement('option')

                        option.value = city.city;
                        option.textContent = city.city;

                        city_list.appendChild(option);
                    });
                } catch (error) {
                    console.error("Error: ", error);
                }
        }
        fetchCities();   
        </script>

        <script> 
            let chart_1;
            let chart_2;
            let chart_3;
            let chart_4;
            city = fetchCities()
            get_default_city = [
                option.textContent = city.city[0]
            ]
            async function getData(city) {
                const url = `/api/weather/${city}/`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`Response status: ${response.status}`);
                    }

                    const result = await response.json();
                    const city_select = document.getElementById('citySelect');
                    
                    city_select.addEventListener('change', function() {
                        getData(city_select.value);
                    });
                
                    const temperatures = result.map(record => record.temperature);
                    const perceived_temps = result.map(record => record.perceived_temperature);
                    const rainfall = result.map(record => record.rainfall_mm);
                    const humidity = result.map(record => Number(record.humidity));
                    const labels = result.map(record => record.created_at);

                    const ctx = document.getElementById('Temperature Chart');
                    if (chart_1) {
                        chart_1.destroy();
                    }
                    chart_1 = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Temperature',
                                data: temperatures,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                    const ctx2 = document.getElementById('Perceived Temperature Chart');
                    if (chart_2) {
                        chart_2.destroy()
                    }
                    chart_2 = new Chart(ctx2, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Perceived Temperature',
                                data: perceived_temps,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                    const ctx3 = document.getElementById('Rain Chart');
                    if (chart_3) {
                        chart_3.destroy();
                    }
                    chart_3 = new Chart(ctx3, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Rainfall',
                                data: rainfall,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                    const ctx4 = document.getElementById('Humidity Chart');
                    if (chart_4) {
                        chart_4.destroy();
                    }
                    chart_4 = new Chart(ctx4, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Humidity',
                                data: humidity,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                } catch (error) {
                    console.error('Error fetching data:', error);
                }
            }
            getData(city);
        </script>

    </body>
</html>
